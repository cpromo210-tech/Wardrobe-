<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wardrobe</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
 --bg:#09090b; --card:#111113; --card2:#18181b; --line:#1f1f23; --line2:#2a2a30;
 --txt:#f0ece4; --mid:#8a8378; --dim:#55504a; --dim2:#37342f;
 --gold:#c9a96e; --gold2:#d4a843;
 --grn:#4ade80; --blu:#38bdf8; --pur:#c084fc; --red:#ef4444; --org:#f97316;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;padding-bottom:70px}
.wrap{max-width:1100px;margin:0 auto;padding:0 16px}
.bebas{font-family:'Bebas Neue',sans-serif}
.mono{font-family:'DM Mono',monospace}

header{background:var(--card);border-bottom:1px solid var(--line);padding:30px 16px 0;text-align:center;position:relative;overflow:hidden}
header::after{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,rgba(201,169,110,.07),transparent 62%)}
header .eb{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.4em;color:var(--gold);text-transform:uppercase;position:relative}
header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,7vw,46px);letter-spacing:1px;margin-top:6px;position:relative;
 background:linear-gradient(135deg,var(--txt) 25%,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header .sb{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:.1em;margin-top:4px;position:relative}

nav{position:sticky;top:0;z-index:60;background:rgba(9,9,11,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);margin-top:18px}
.nv{max-width:1100px;margin:0 auto;display:flex;overflow-x:auto;scrollbar-width:none;padding:0 8px}
.nv::-webkit-scrollbar{display:none}
nav button{background:none;border:none;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);padding:14px 12px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s}
nav button:hover{color:var(--mid)}
nav button.on{color:var(--gold);border-bottom-color:var(--gold)}

.pn{display:none;padding:24px 0 0}
.pn.on{display:block;animation:f .25s ease}
@keyframes f{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* HERO STATS */
.hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.hs{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}
.hs.big{background:linear-gradient(135deg,rgba(201,169,110,.1),rgba(201,169,110,.02));border-color:rgba(201,169,110,.3)}
.hs .l{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.6px;color:var(--dim);margin-bottom:6px;text-transform:uppercase}
.hs .v{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1;color:var(--gold)}
.hs .s{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);margin-top:5px;line-height:1.6}

.lb{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--gold);margin:26px 0 12px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap}
.lb span{color:var(--dim);letter-spacing:.5px;text-transform:none;font-size:10px}

/* PIECES */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.pc{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;position:relative}
.pc.dead{border-color:rgba(239,68,68,.3)}
.pcimg{aspect-ratio:3/4;background:var(--card2);display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;overflow:hidden}
.pcimg img{width:100%;height:100%;object-fit:cover}
.pcimg .ph{font-size:22px;opacity:.25}
.pcsw{position:absolute;top:8px;left:8px;width:16px;height:16px;border-radius:50%;border:1.5px solid rgba(255,255,255,.35)}
.pcx{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);border:none;color:var(--dim);width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:13px;line-height:1}
.pcx:hover{color:var(--red)}
.pcb{padding:11px 12px}
.pcn{font-size:12.5px;font-weight:500;line-height:1.3}
.pcm{font-family:'DM Mono',monospace;font-size:8.5px;color:var(--dim);margin-top:4px;line-height:1.6}
.pcw{font-family:'DM Mono',monospace;font-size:8.5px;color:var(--grn);margin-top:3px}
.pcw.warn{color:var(--org)}
.pcw.bad{color:var(--red)}

/* OUTFIT */
.of{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px;margin-bottom:9px}
.of.fav{border-color:var(--gold)}
.ofh{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:11px}
.ofn{font-family:'Bebas Neue',sans-serif;font-size:19px;line-height:1.1}
.ofm{font-family:'DM Mono',monospace;font-size:8.5px;color:var(--dim);margin-top:3px}
.ofa{display:flex;gap:5px;flex-shrink:0}
.ofb{background:var(--card2);border:1px solid var(--line2);color:var(--dim);border-radius:6px;padding:6px 10px;font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.08em;cursor:pointer;white-space:nowrap}
.ofb:hover{border-color:var(--gold);color:var(--gold)}
.ofb.on{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}
.ofb.wear{border-color:rgba(74,222,128,.4);color:var(--grn)}
.ofp{display:flex;flex-direction:column;gap:5px}
.ofr{display:flex;align-items:center;gap:9px;padding:5px 0;border-bottom:1px solid var(--line);font-size:12px}
.ofr:last-child{border-bottom:none}
.ofd{width:9px;height:9px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.18)}
.ofs{font-family:'DM Mono',monospace;font-size:8px;color:var(--dim2);width:48px;flex-shrink:0;text-transform:uppercase;letter-spacing:.08em}
.oflk{margin-left:auto;background:none;border:none;color:var(--dim2);cursor:pointer;font-size:11px;padding:2px 5px;flex-shrink:0}
.oflk.on{color:var(--gold)}

/* GAP */
.gap{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:10px;padding:14px 16px;margin-bottom:8px}
.gaph{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.gapn{font-size:14px;font-weight:500}
.gapv{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--grn);white-space:nowrap}
.gapw{font-size:11.5px;color:var(--mid);line-height:1.75}
.gapw b{color:var(--txt)}
.gapb{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.gapc{font-family:'DM Mono',monospace;font-size:8px;background:var(--card2);border:1px solid var(--line2);border-radius:20px;padding:3px 9px;color:var(--dim)}

/* FORMS */
.frm{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:12px}
.fr{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:9px}
.fr input,.fr select{background:var(--card2);border:1px solid var(--line2);color:var(--txt);border-radius:7px;padding:10px 12px;font-family:'DM Mono',monospace;font-size:12px;flex:1;min-width:100px}
.fr input:focus,.fr select:focus{outline:none;border-color:var(--gold)}
.fr input::placeholder{color:var(--dim2)}
.btn{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.6px;background:var(--card2);border:1px solid var(--line2);color:var(--mid);padding:11px 18px;border-radius:7px;cursor:pointer;text-transform:uppercase}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn.go{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700}
.btn.go:hover{opacity:.85;color:#000}
.btn.gh{background:none}

.sw{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.swb{width:28px;height:28px;border-radius:7px;border:2px solid transparent;cursor:pointer;position:relative}
.swb.on{border-color:var(--txt);transform:scale(1.1)}

/* MEASURE */
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:9px}
.mi{background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:12px}
.mi .l{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.4px;color:var(--dim);text-transform:uppercase;margin-bottom:5px}
.mi input{width:100%;background:var(--bg);border:1px solid var(--line2);color:var(--gold);border-radius:6px;padding:8px;font-family:'Bebas Neue',sans-serif;font-size:22px;text-align:center}
.mi input:focus{outline:none;border-color:var(--gold)}
.mi .h{font-size:10px;color:var(--dim);margin-top:6px;line-height:1.6}

.bs{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:13px 15px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.bsn{font-size:13.5px;font-weight:500}
.bsw{font-size:11px;color:var(--mid);margin-top:3px;line-height:1.7}
.bsz{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--gold);flex-shrink:0;line-height:1}
.bsl{font-family:'DM Mono',monospace;font-size:7.5px;color:var(--dim);text-align:center;letter-spacing:.5px}

/* CARDS */
.cd{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:16px;margin-bottom:9px}
.cd.gl{border-left:3px solid var(--gold)}
.cdh{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:.3px}
.cds{font-size:11.5px;color:var(--mid);line-height:1.8;margin-top:5px}
.cds b{color:var(--txt)}
.cdt{font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);margin-top:8px;letter-spacing:.06em}

.note{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;font-size:12px;color:var(--mid);line-height:1.85;margin-bottom:12px}
.note b{color:var(--txt)}
.note.gd{border-color:rgba(201,169,110,.3);background:rgba(201,169,110,.03)}
.emp{background:var(--card);border:1px dashed var(--line2);border-radius:11px;padding:26px 18px;text-align:center;font-size:12.5px;color:var(--dim);line-height:1.9}
.emp b{color:var(--txt)}

.pill{display:inline-block;font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.14em;padding:3px 8px;border-radius:20px;text-transform:uppercase;border:1px solid}
.pill.own{color:var(--grn);border-color:var(--grn)}
.pill.buy{color:var(--gold);border-color:var(--gold)}
.pill.inv{color:var(--red);border-color:var(--red)}

table{width:100%;border-collapse:collapse;font-size:12px}
th{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.4px;color:var(--gold);text-transform:uppercase;text-align:left;padding:8px 10px;border-bottom:1px solid var(--line2)}
td{padding:9px 10px;border-bottom:1px solid var(--line);color:var(--mid)}
td:first-child{color:var(--txt)}
tr:last-child td{border-bottom:none}

input[type=file]{display:none}
.tst{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(150%);background:var(--gold);color:#000;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;padding:11px 20px;border-radius:100px;z-index:99;transition:transform .28s;font-weight:700}
.tst.on{transform:translateX(-50%) translateY(0)}
a{color:var(--gold);text-decoration:none}
a:hover{text-decoration:underline}
footer{text-align:center;padding:34px 16px 0;font-family:'DM Mono',monospace;font-size:8px;color:var(--dim2);letter-spacing:.2em;line-height:2.4;text-transform:uppercase}
</style>
</head>
<body>

<header>
  <div class="eb">Your Personal Stylist</div>
  <h1>THE WARDROBE</h1>
  <div class="sb">CLOSET · OUTFITS · FIT · COLOR · CARE · SAN ANTONIO</div>
</header>

<nav><div class="nv">
  <button class="on" data-t="closet">Closet</button>
  <button data-t="outfits">Outfits</button>
  <button data-t="next">Next Buy</button>
  <button data-t="fit">Your Fit</button>
  <button data-t="basics">10 Basics</button>
  <button data-t="brands">Brands</button>
  <button data-t="stores">SA Stores</button>
  <button data-t="care">Care</button>
  <button data-t="sales">Sale Watch</button>
  <button data-t="rules">Rules</button>
</div></nav>

<div class="wrap">
  <div class="pn on" id="closet"></div>
  <div class="pn" id="outfits"></div>
  <div class="pn" id="next"></div>
  <div class="pn" id="fit"></div>
  <div class="pn" id="basics"></div>
  <div class="pn" id="brands"></div>
  <div class="pn" id="stores"></div>
  <div class="pn" id="care"></div>
  <div class="pn" id="sales"></div>
  <div class="pn" id="rules"></div>
</div>

<input type="file" id="pf" accept="image/*">
<div class="tst" id="tst"></div>
<footer>Fit over brand, every time · Get measured, then shop<br>10 right pieces beats 40 wrong ones</footer>

<script>
/* ═══════════════════════════════════════════════════════════════
   WARDROBE ENGINE
   Color matching runs off the Michael 84 grid.
   Outfit generation is combinatorial, filtered by every rule in
   the guide: belt=boot, wide bottom needs slim top, warm stays
   with warm, formality levels must overlap.
   ═══════════════════════════════════════════════════════════════ */
const V='wd1';
const L=(k,d)=>{try{const r=localStorage.getItem(V+'_'+k);return r?JSON.parse(r):d;}catch(e){return d;}};
const S=(k,v)=>{try{localStorage.setItem(V+'_'+k,JSON.stringify(v));return 1;}catch(e){return 0;}};

/* ── COLOR GRID (Michael 84) ── */
const CO={
black:{h:"#111111",w:0,c:["red","navy","grey","white","lightblue"],t:["charcoal","lightgrey"]},
navy:{h:"#1a2744",w:0,c:["black","tan","grey","white"],t:["blue","lightblue"]},
grey:{h:"#8a8a8a",w:0,c:["black","navy","pink","white","red"],t:["lightgrey","charcoal"]},
tan:{h:"#c9a87c",w:1,c:["black","navy","green","brown","red"],t:["camel","beige"]},
white:{h:"#f4f2ed",w:0,c:["black","navy","grey","green"],t:["lightgrey","cream"]},
green:{h:"#2d5a3d",w:1,c:["black","lightblue","grey","yellow","tan"],t:["olive"]},
blue:{h:"#2f6fbf",w:0,c:["black","tan","white","navy"],t:["lightblue","navy"]},
charcoal:{h:"#3a3a3a",w:0,c:["black","navy","grey","tan","cream"],t:["black","grey"]},
burgundy:{h:"#8c2f52",w:1,c:["black","tan","grey","white"],t:["red"]},
red:{h:"#9e2b25",w:1,c:["black","navy","grey","white","tan"],t:["burgundy","orange"]},
orange:{h:"#d4622a",w:1,c:["black","grey","white","tan"],t:["red","yellow"]},
yellow:{h:"#e0b344",w:1,c:["black","green","grey","white","navy"],t:["orange","tan"]},
brown:{h:"#7a5230",w:1,c:["black","navy","grey","white","cream"],t:["tan","camel","cognac"]},
pink:{h:"#e0a9b8",w:1,c:["black","navy","grey","white"],t:["burgundy"]},
cream:{h:"#ede4d3",w:1,c:["black","navy","brown","charcoal","green"],t:["beige","camel","white"]},
camel:{h:"#b8926a",w:1,c:["black","navy","white","cream","brown"],t:["tan","beige","cognac"]},
olive:{h:"#5c6141",w:1,c:["black","tan","cream","white","navy"],t:["green"]},
lightgrey:{h:"#c4c4c4",w:0,c:["black","navy","charcoal","white"],t:["grey","white"]},
lightblue:{h:"#a8c8e8",w:0,c:["black","navy","grey","white","charcoal"],t:["blue"]},
beige:{h:"#d9cbb3",w:1,c:["black","navy","brown","charcoal"],t:["cream","camel","tan"]},
cognac:{h:"#9c5f2e",w:1,c:["black","navy","cream","white","olive"],t:["brown","tan","camel"]}
};
const CK=Object.keys(CO);
function cmatch(a,b){
  if(a===b)return 1;
  const A=CO[a],B=CO[b];
  if(!A||!B)return 0;
  if(A.c.indexOf(b)>-1||B.c.indexOf(a)>-1)return 1;
  if(A.t.indexOf(b)>-1||B.t.indexOf(a)>-1)return 1;
  return 0;
}

/* ── BRAND SIZING ── */
const BR={
"Zara":{f:"slim",n:"Runs slim and short. Size up if you are between sizes or carry any shoulder width."},
"Mango":{f:"slim",n:"European cut. Slim through the chest, sleeves run short."},
"Uniqlo":{f:"true",n:"True to size and the most reliable of the bunch. Order your measured size."},
"H&M":{f:"slim",n:"Inconsistent between lines. Slim overall. Try it on at North Star."},
"Ralph Lauren":{f:"relaxed",n:"Classic American cut, runs generous. Size down, or buy the slim fit line."},
"Buck Mason":{f:"true",n:"True to size with a curved hem. The henley is worth the money."},
"Everlane":{f:"true",n:"True to size, boxy through the body."},
"Banana Republic":{f:"relaxed",n:"Runs a touch large. The 40% off sale runs almost constantly."},
"J.Crew":{f:"slim",n:"The slim line is genuinely slim. The standard fit is true."},
"COS":{f:"relaxed",n:"Architectural and intentionally oversized. Size down one."},
"Massimo Dutti":{f:"slim",n:"Premium European. Slim and precise. At La Cantera."},
"Abercrombie":{f:"athletic",n:"Cut for athletic builds. Best fit on this list if you have shoulders."},
"All Saints":{f:"slim",n:"Very slim, especially the leather. Size up for the biker jacket."},
"Calvin Klein":{f:"slim",n:"Clean minimal cut. The slim fit line is reliable."},
"Club Monaco":{f:"slim",n:"The most elevated cut here. Slim and precise."},
"Champion":{f:"relaxed",n:"Runs large. Size down for a fitted hoodie."},
"Tommy Hilfiger":{f:"relaxed",n:"Classic fit runs generous. Buy the slim line."}
};
const SZC={
slim:[[36,"S"],[38,"S"],[40,"M"],[42,"M"],[44,"L"],[46,"L"],[48,"XL"]],
true:[[36,"S"],[38,"M"],[40,"M"],[42,"L"],[44,"L"],[46,"XL"],[48,"XL"]],
relaxed:[[36,"XS"],[38,"S"],[40,"S"],[42,"M"],[44,"M"],[46,"L"],[48,"XL"]],
athletic:[[36,"S"],[38,"S"],[40,"M"],[42,"M"],[44,"L"],[46,"L"],[48,"XL"]]
};
function sizeFor(brand,chest){
  if(!chest)return null;
  const f=(BR[brand]||{f:"true"}).f;
  const tbl=SZC[f];
  for(let i=0;i<tbl.length;i++){ if(chest<=tbl[i][0]) return tbl[i][1]; }
  return "XL";
}

/* ── SLOTS ── */
const SLOT={top:"Top",bottom:"Bottom",shoe:"Shoes",layer:"Layer",belt:"Belt"};
const FORM=["","Casual","Smart Casual","Dressy"];

/* ── THE 10 BASICS (+3 from the brand guide) ── */
const BASICS=[
{id:"b1",n:"Pleated Trousers",slot:"bottom",cols:["charcoal","black","beige","cream"],form:[2,3],price:70,fit:"wide",
 why:"The anchor of the whole wardrobe. Goes with boots, sneakers, and loafers — casual or dressed up.",
 tip:"Start with charcoal or black. They pair with literally everything you own. Sand or beige second.",
 buy:[["ZARA","Relaxed Fit Pleated Pants","$69.90","https://www.zara.com/us/en/relaxed-fit-pleated-pants-p00706950.html"],["MANGO","Flowing Pleated Pants","$69.99","https://shop.mango.com/us/en/c/men/trousers"]]},
{id:"b2",n:"Leather Boots",slot:"shoe",cols:["black","brown","cognac"],form:[2,3],price:190,fit:"-",
 why:"The single best upgrade you can make. One good leather boot elevates every fit instantly.",
 tip:"Black first. They go with black jeans, charcoal trousers, and dark denim. Brown second for versatility.",
 buy:[["MANGO","Suede Leather Ankle Boot","$119.99","https://shop.mango.com/us/en/c/men/shoes/boots-and-ankle-boots/cd144354"],["Steve Madden","Chunky Leather Ankle Boot","$90-110","https://www.stevemadden.com/collections/mens-boots"]]},
{id:"b3",n:"Oxford Button-Up",slot:"top",cols:["white","cream","lightblue"],form:[2,3],price:55,fit:"slim",
 why:"The most versatile shirt you own. Tucked into trousers it is dressed up. Open over a tee it is casual.",
 tip:"Ask for OXFORD, not poplin. Oxford is the thick, soft, casual cotton. Poplin is the thin suit shirt.",
 buy:[["ZARA","Oxford Shirt - White","$49.90","https://www.zara.com/us/en/man-shirts-long-sleeved-l1784.html"],["Uniqlo","Premium Linen Shirt","$39.90","https://www.uniqlo.com/us/en/men/tops/shirts"]]},
{id:"b4",n:"Leather Jacket",slot:"layer",cols:["black"],form:[1,2],price:170,fit:"slim",
 why:"The piece that makes every fit look intentional. Even a tee and jeans looks styled under leather.",
 tip:"Black only for your first one. No exceptions. It goes with everything you already own.",
 buy:[["MANGO","Nappa Leather Jacket","$239 (was $399)","https://shop.mango.com/us/en/c/men/jackets/leather_b2708136"],["All Saints","Kushiro Biker","$349 — wait for sale","https://www.allsaints.com/collections/mens-leather-jackets"]]},
{id:"b5",n:"Black Hoodie",slot:"layer",cols:["black"],form:[1],price:40,fit:"reg",

/* ── OUTFIT ENGINE ── */
function valid(o){
  const t=o.top,b=o.bottom,s=o.shoe;
  if(!t||!b||!s)return 0;
  const vis=[t,b,s]; if(o.layer)vis.push(o.layer); if(o.belt)vis.push(o.belt);
  for(let i=0;i<vis.length;i++)for(let j=i+1;j<vis.length;j++)
    if(!cmatch(vis[i].c,vis[j].c))return 0;
  if(o.belt&&s.base==='b2'&&o.belt.c!==s.c)return 0;      // belt = boot
  if(b.fit==='wide'&&t.fit!=='slim')return 0;              // wide bottom, slim top
  let lv=t.form.slice();
  vis.forEach(p=>{lv=lv.filter(x=>p.form.indexOf(x)>-1);});
  if(!lv.length)return 0;
  return Math.min.apply(null,lv);
}
function gen(cl){
  const by={};
  cl.forEach(p=>{(by[p.slot]=by[p.slot]||[]).push(p);});
  const T=by.top||[],B=by.bottom||[],S_=by.shoe||[];
  const LY=[null].concat(by.layer||[]), BE=[null].concat(by.belt||[]);
  const out=[];
  T.forEach(t=>B.forEach(b=>S_.forEach(s=>LY.forEach(l=>BE.forEach(be=>{
    const o={top:t,bottom:b,shoe:s};
    if(l)o.layer=l; if(be)o.belt=be;
    const f=valid(o);
    if(f){o.form=f;o.key=[t.id,b.id,s.id,l?l.id:'-',be?be.id:'-'].join('|');out.push(o);}
  })))));
  return out;
}
function pieces(o){const a=[o.top,o.bottom,o.shoe];if(o.layer)a.push(o.layer);if(o.belt)a.push(o.belt);return a;}
function ofName(o){
  const c=o.top.c, f=o.form;
  const mono=pieces(o).every(p=>p.c===c);
  if(mono)return 'The '+cap(c)+' Monochrome';
  if(f===3)return 'The Dressed Up';
  if(o.layer&&o.layer.base==='b4')return 'The Leather Look';
  if(f===1)return 'The Weekend';
  return 'The Smart Casual';
}
const cap=s=>s.charAt(0).toUpperCase()+s.slice(1);

const daysSince=d=>d?Math.floor((new Date()-new Date(d+'T00:00:00'))/86400000):null;
const today=()=>new Date().toISOString().slice(0,10);

let selCol='black';
function bindSwatch(){
  const sw=document.getElementById('a-sw');
  if(!sw)return;
  sw.querySelectorAll('.swb').forEach(b=>{
    if(b.dataset.col===selCol)b.classList.add('on');

      selCol=b.dataset.col;
      sw.querySelectorAll('.swb').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
    });
  });
  const bs=document.getElementById('a-base');
  if(bs)bs.addEventListener('change',()=>{
    document.getElementById('a-custom').style.display=bs.value==='custom'?'flex':'none';

}

  h+='<input id="fc-shoulder" type="number" step="0.5" placeholder="Garment shoulder (in)">';
  h+='<button class="btn go" data-a="fitcheck">CHECK</button></div>';
  h+='<div id="fc-out"></div></div>';
  document.getElementById('fit').innerHTML=h;
}
function fitCheck(){
  const m=W.meas;
  const gc=parseFloat(document.getElementById('fc-chest').value);
  const gs=parseFloat(document.getElementById('fc-shoulder').value);
  const out=document.getElementById('fc-out');
  if(!m.chest){out.innerHTML='<div class="note">Enter your own chest measurement above first.</div>';return;}
  let h='';
  if(gc){
    const ease=gc-m.chest;
    let v,c;
    if(ease<1){v='Too tight. It will pull across the chest and the buttons will gape. Size up.';c='var(--red)';}
    else if(ease<3){v='Very slim. Fitted, but it will work if that is the look you want and you are not layering under it.';c='var(--org)';}
    else if(ease<6){v='This is the sweet spot. Fitted without pulling, room to layer a tee underneath.';c='var(--grn)';}
    else if(ease<9){v='Relaxed. Fine for a hoodie or an overshirt, too much for a fitted tee or a slim button-up.';c='var(--org)';}
    else{v='Too big. It will read as sloppy, not relaxed. Size down.';c='var(--red)';}
    h+='<div class="cd" style="border-left:3px solid '+c+'"><div class="cdh">CHEST — '+ease.toFixed(1)+'" of ease</div>';
    h+='<div class="cds">Garment '+gc+'" vs your '+m.chest+'". <b style="color:'+c+'">'+v+'</b></div></div>';
  }
  if(gs&&m.shoulder){
    const d=gs-m.shoulder;
    let v,c;
    if(d<-0.5){v='Too narrow. The shoulder seam will sit inside your actual shoulder and restrict every movement. This is the one thing a tailor cannot fix. Do not buy it.';c='var(--red)';}
    else if(d<=0.75){v='Correct. The seam lands on your shoulder bone, which is the single most important fit rule in outerwear.';c='var(--grn)';}
    else if(d<=1.5){v='Slightly wide. Acceptable on a relaxed jacket, wrong on a blazer.';c='var(--org)';}
    else{v='Way too wide. The seam will droop down your arm. Everything else can be tailored — this cannot.';c='var(--red)';}
    h+='<div class="cd" style="border-left:3px solid '+c+'"><div class="cdh">SHOULDER — '+(d>0?'+':'')+d.toFixed(1)+'"</div>';
    h+='<div class="cds">Garment '+gs+'" vs your '+m.shoulder+'". <b style="color:'+c+'">'+v+'</b></div></div>';
  }
  if(!h)h='<div class="note">Enter at least a garment chest measurement.</div>';
  out.innerHTML=h;
}

  const now=new Date();
  CARE.forEach(c=>{
    const key=c.c.toLowerCase().replace(/[^a-z]+/g,'_');

/* ── RULES ── */
const RULES=[
 ['NEUTRALS FIRST','Build entirely in black, white, cream, charcoal, navy, grey, and camel before you add any colour. Neutrals mix freely — every piece pairs with every other piece, which is exactly why the outfit count compounds so fast.'],
 ['BELT MATCHES BOOT','Black boots means a black belt. Brown or cognac boots means a brown belt. This rule does not bend, and the outfit engine enforces it — you will never see a mismatched pair generated.'],
 ['WIDE BOTTOM, SLIM TOP','Pleated or baggy trousers pair with a fitted tee or a slim henley. Not an oversized shirt. Oversized on oversized reads as shapeless, not relaxed. The engine enforces this too.'],
 ['WARM STAYS WITH WARM','Camel, tan, cream, and cognac live together. Black, grey, navy, and white live together. Mixing means one warm piece against a cool base, or the reverse. Never a free-for-all.'],
 ['ONE STATEMENT MAX','If the shirt is doing something — texture, pattern, colour — the trousers stay neutral. If the trousers are wide and pleated, that is already the statement, so the shirt goes plain.'],
 ['TONE ON TONE WORKS','Head-to-toe in one tone reads as intentional and sophisticated, but only if the textures vary. Ribbed henley plus leather jacket plus pleated trousers, all black. That is the formula.'],
 ['THE SHOULDER SEAM IS EVERYTHING','A jacket that sits on your shoulder bone — not falling off it, not pinching inside it — is the single most important fit rule in outerwear. Everything else can be tailored. This cannot.'],
 ['CUFF AT THE WRIST BONE','A long sleeve should end at the wrist bone. Too long? One roll looks intentional. Two rolls means it does not fit and needs a tailor.'],
 ['TROUSER BREAK','A slight break — one small fold at the shoe — or no break at all. Never pooling on the ground. That is a fifteen dollar hem at Penner\'s and it changes the whole silhouette.'],
 ['MATCH YOUR METALS','Belt buckle matches your watch. Silver with silver, gold with gold. Nobody consciously notices when it is right, and everybody notices when it is wrong.'],
 ['FIT OVER BRAND, ALWAYS','A $40 shirt that fits perfectly beats a $400 shirt that does not. This is not a consolation — it is the actual hierarchy. Get measured first. Shop second. Never the other way around.']
];
function rRules(){
  let h='<div class="note gd">Every rule below is <b>enforced by the outfit engine</b>, not just described. If a combination appears on the Outfits tab, it has already passed all of them.</div>';
  RULES.forEach((r,i)=>{
    h+='<div class="cd gl"><div class="cdh">'+String(i+1).padStart(2,'0')+' · '+r[0]+'</div>';
    h+='<div class="cds">'+r[1]+'</div></div>';
  });
  document.getElementById('rules').innerHTML=h;
}

/* ── ACTIONS ── */
function SVA(){S('closet',W.closet);S('fav',W.fav);S('meas',W.meas);S('care',W.care);S('season',W.season);}
function RA(){rCloset();rOutfits();rNext();rFit();rBasics();rBrands();rStores();rCare();rSales();rRules();}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),1700);}

let photoIdx=null;
document.addEventListener('click',function(e){
  const b=e.target.closest('[data-a]');if(!b)return;
  const a=b.dataset.a;
  if(a==='add'){
    const bs=document.getElementById('a-base').value;
    const pr=parseFloat(document.getElementById('a-price').value)||0;
    let p;
    if(bs&&bs!=='custom'){
      const base=B_(bs);
      p={id:'p'+Date.now(),base:bs,n:base.n,slot:base.slot,c:selCol,form:base.form,fit:base.fit,price:pr||base.price,wears:[],added:today()};
    } else {
      const n=document.getElementById('a-name').value.trim();
      if(!n){toast('Give it a name');return;}
      p={id:'p'+Date.now(),base:'custom',n:n,slot:document.getElementById('a-slot').value,
         c:selCol,form:[1,2],fit:document.getElementById('a-fit').value,price:pr,wears:[],added:today()};
    }
    const before=gen(W.closet).length;
    W.closet.push(p);SVA();RA();
    const after=gen(W.closet).length;
    toast(after>before?'+'+(after-before)+' new outfits':'Added — no new outfits yet');
  }
  else if(a==='del'){W.closet.splice(+b.dataset.i,1);SVA();RA();}
  else if(a==='photo'){photoIdx=+b.dataset.i;document.getElementById('pf').click();}
  else if(a==='season'){W.season=b.dataset.v;SVA();RA();}
  else if(a==='fav'){
    const k=b.dataset.k,i=W.fav.indexOf(k);
    if(i>-1)W.fav.splice(i,1);else W.fav.push(k);
    SVA();rOutfits();}
  else if(a==='wear'){
    const k=b.dataset.k;
    const o=gen(W.closet).filter(x=>x.key===k)[0];
    if(!o)return;
    pieces(o).forEach(p=>{
      const real=W.closet.filter(x=>x.id===p.id)[0];
      if(real){if(!real.wears)real.wears=[];real.wears.push(today());}
    });
    SVA();RA();toast('Logged. Cost per wear updated.');}
  else if(a==='care'){W.care[b.dataset.k]=today();SVA();rCare();toast('Logged');}
  else if(a==='fitcheck'){fitCheck();}
},false);

document.addEventListener('change',function(e){
  const i=e.target.closest('[data-a="meas"]');if(!i)return;
  const v=parseFloat(i.value);
  if(isNaN(v))delete W.meas[i.dataset.k];else W.meas[i.dataset.k]=v;
  SVA();rFit();rBrands();
},false);

document.getElementById('pf').addEventListener('change',function(e){
  const f=e.target.files[0];if(!f||photoIdx===null)return;
  const r=new FileReader();
  r.onload=ev=>{
    const im=new Image();
    im.onload=()=>{
      const MX=600;let w=im.width,h=im.height;
      if(w>h&&w>MX){h=h*MX/w;w=MX;}else if(h>MX){w=w*MX/h;h=MX;}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(im,0,0,w,h);
      W.closet[photoIdx].img=c.toDataURL('image/jpeg',0.7);
      if(S('closet',W.closet))toast('Photo saved');else{delete W.closet[photoIdx].img;toast('Storage full');}
      rCloset();
    };
    im.src=ev.target.result;
  };
  r.readAsDataURL(f);e.target.value='';
});

document.querySelectorAll('nav button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('nav button').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('.pn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    document.getElementById(b.dataset.t).classList.add('on');
    RA();
    window.scrollTo({top:0,behavior:'smooth'});
  });
});
RA();
